name: Build Native Binaries

# Builds and publishes the 5 @cmetech/otto-engine-* native packages.
# After publishing succeeds, chains to npm-publish.yml to publish the
# main @cmetech/otto package. The split exists because npm trusted
# publishing matches publishes against the originating workflow filename,
# and the main package's trusted publisher record points at npm-publish.yml.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish platform packages to npm"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      publish_auth:
        description: "npm publish auth mode"
        required: false
        default: "trusted"
        type: choice
        options:
          - "trusted"
          - "token"

permissions:
  contents: read
  id-token: write
  actions: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            platform: darwin-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            platform: darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64-gnu
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64-msvc

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust compilation target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-${{ matrix.platform }}
          workspaces: |
            native -> target

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build native addon
        working-directory: native/crates/engine
        env:
          # CARGO_ENCODED_RUSTFLAGS overrides target-specific rustflags in
          # .cargo/config.toml, which sets -C target-cpu=native for dev builds.
          # CI must produce portable binaries.
          CARGO_ENCODED_RUSTFLAGS: ""
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp native/target/${{ matrix.target }}/release/libgsd_engine.dylib artifacts/gsd_engine.node 2>/dev/null || \
          cp native/target/${{ matrix.target }}/release/libgsd_engine.so artifacts/gsd_engine.node 2>/dev/null || \
          { echo "::error::No library found for ${{ matrix.platform }}"; exit 1; }
          ls -la artifacts/

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir artifacts
          copy native\target\${{ matrix.target }}\release\gsd_engine.dll artifacts\gsd_engine.node

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: native-${{ matrix.platform }}
          path: artifacts/gsd_engine.node
          if-no-files-found: error

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish == 'true'
    # npm trusted publishing requires GitHub-hosted runners for OIDC.
    runs-on: ubuntu-latest
    name: Publish platform packages

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify npm publish toolchain
        run: |
          node -e "const [major, minor] = process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && minor < 14)) { throw new Error('npm trusted publishing requires Node >= 22.14.0'); }"
          node -e "const v=require('child_process').execSync('npm --version',{encoding:'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) { throw new Error('npm trusted publishing requires npm >= 11.5.1'); }"

      - name: Select npm publish auth
        run: |
          if [ "${{ github.event.inputs.publish_auth || 'trusted' }}" = "token" ]; then
            echo "Using NPM_TOKEN for npm publish bootstrap."
          else
            echo "Using npm trusted publishing for npm publish."
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Copy binaries to platform packages
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            cp "artifacts/native-${platform}/gsd_engine.node" "native/npm/${platform}/otto_engine.node"
            echo "Copied binary for ${platform}"
            ls -la "native/npm/${platform}/"
          done

      - name: Sync platform package versions
        run: node native/scripts/sync-platform-versions.cjs

      - name: Validate platform package contents
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            test -s "native/npm/${platform}/otto_engine.node" || { echo "::error::native/npm/${platform}/otto_engine.node missing or empty"; exit 1; }
            (cd "native/npm/${platform}" && npm pack --dry-run)
          done

      - name: Detect channel from version
        id: channel-check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if echo "$VERSION" | grep -q '\-next\.'; then
            echo "channel=next" >> "$GITHUB_OUTPUT"
            echo "tag_flag=--tag next" >> "$GITHUB_OUTPUT"
            echo "Prerelease detected: ${VERSION} → publishing with --tag next"
          elif echo "$VERSION" | grep -q '\-dev\.'; then
            echo "channel=dev" >> "$GITHUB_OUTPUT"
            echo "tag_flag=--tag dev" >> "$GITHUB_OUTPUT"
            echo "Dev build detected: ${VERSION} → publishing with --tag dev"
          else
            echo "channel=latest" >> "$GITHUB_OUTPUT"
            echo "tag_flag=--tag latest" >> "$GITHUB_OUTPUT"
            echo "Stable release: ${VERSION} → publishing with --tag latest"
          fi

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ github.event.inputs.publish_auth == 'token' && secrets.NPM_TOKEN || '' }}
        run: |
          for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            echo "Publishing @cmetech/otto-engine-${platform}..."
            cd "native/npm/${platform}"
            if OUTPUT=$(npm publish --access public ${{ steps.channel-check.outputs.tag_flag }} 2>&1); then
              echo "$OUTPUT"
            else
              if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
                echo "Already published, skipping"
              else
                echo "::error::Failed to publish ${platform}: $OUTPUT"
                exit 1
              fi
            fi
            cd "$GITHUB_WORKSPACE"
          done

      - name: Verify platform packages are published
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Verifying platform packages at version ${VERSION}..."
          # First-publish registry propagation can take 10-15 min. Budget: 20 attempts, max 60s delay (~18 min worst case).
          DELAY=5
          MAX_ATTEMPTS=20
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            FAILED=0
            for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
              PKG="@cmetech/otto-engine-${platform}"
              PUBLISHED=$(npm view "${PKG}@${VERSION}" version 2>/dev/null || echo "")
              if [ "${PUBLISHED}" != "${VERSION}" ]; then
                FAILED=1
                break
              fi
            done
            if [ "${FAILED}" = "0" ]; then
              echo "All platform packages verified (attempt ${attempt})."
              break
            fi
            if [ "$attempt" = "$MAX_ATTEMPTS" ]; then
              echo "::error::One or more platform packages not found after ${MAX_ATTEMPTS} attempts. Aborting."
              for platform in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
                PKG="@cmetech/otto-engine-${platform}"
                PUBLISHED=$(npm view "${PKG}@${VERSION}" version 2>/dev/null || echo "")
                if [ "${PUBLISHED}" = "${VERSION}" ]; then
                  echo "  ✓ ${PKG}@${VERSION}"
                else
                  echo "  ✗ ${PKG}@${VERSION} (got: '${PUBLISHED}')"
                fi
              done
              exit 1
            fi
            echo "  Attempt ${attempt}/${MAX_ATTEMPTS}: not all packages visible yet, retrying in ${DELAY}s..."
            sleep "$DELAY"
            DELAY=$((DELAY * 2))
            if [ "$DELAY" -gt 60 ]; then DELAY=60; fi
          done

      - name: Trigger main package publish
        # Trigger npm-publish.yml as a separate workflow so its OIDC token's
        # job_workflow_ref matches the trusted publisher record for
        # @cmetech/otto (which is configured for npm-publish.yml, not this file).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REF="${GITHUB_REF#refs/heads/}"
          REF="${REF#refs/tags/}"
          echo "Triggering npm-publish.yml: channel=${{ steps.channel-check.outputs.channel }} ref=${REF}"
          gh workflow run npm-publish.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${REF}" \
            -f channel=${{ steps.channel-check.outputs.channel }} \
            -f publish_auth=${{ github.event.inputs.publish_auth || 'trusted' }}

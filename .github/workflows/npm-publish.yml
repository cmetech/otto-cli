name: NPM Publish

# Publishes the main @cmetech/otto package via npm trusted publishing.
# Normally triggered by build-native.yml after the @cmetech/otto-engine-*
# native packages are live. Can also be run manually to re-publish or to
# publish a dev/next channel build without re-running native builds.
#
# This is a separate workflow from build-native.yml so that the OIDC
# token's job_workflow_ref matches the trusted publisher record for
# @cmetech/otto (configured for `npm-publish.yml` on npmjs.com).

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "npm dist-tag to publish"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - next
          - latest
      publish_auth:
        description: "npm publish auth mode"
        required: false
        default: "trusted"
        type: choice
        options:
          - "trusted"
          - "token"

concurrency:
  group: npm-publish-${{ github.event.inputs.channel }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish-main:
    name: Publish @cmetech/otto @${{ github.event.inputs.channel }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify npm publish toolchain
        run: |
          node -e "const [major, minor] = process.versions.node.split('.').map(Number); if (major < 22 || (major === 22 && minor < 14)) { throw new Error('Trusted publishing requires Node >= 22.14.0'); }"
          node -e "const v=require('child_process').execSync('npm --version',{encoding:'utf8'}).trim().split('.').map(Number); if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) { throw new Error('Trusted publishing requires npm >= 11.5.1'); }"

      - name: Select npm publish auth
        run: |
          if [ "${{ github.event.inputs.publish_auth || 'trusted' }}" = "token" ]; then
            echo "Using NPM_TOKEN for npm publish bootstrap."
          else
            echo "Using npm trusted publishing for npm publish."
          fi

      - name: Refresh lockfile against current registry state
        # The @cmetech/otto-engine-* native packages are listed as
        # optionalDependencies in package.json. When release:publish is run,
        # build-native.yml has just published a NEW version of those packages,
        # but the lockfile committed at version-bump time was generated before
        # they existed on npm — so `npm ci` would fail strict validation.
        # Refresh the lockfile here so it resolves the just-published natives.
        # --ignore-scripts: skip any postinstall scripts during the refresh.
        # --no-audit/--no-fund: cut noise; these are fetched at install time anyway.
        run: |
          echo "Refreshing lockfile to pick up just-published native engine versions..."
          npm install --package-lock-only --no-audit --no-fund --ignore-scripts

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Build
        run: npm run build

      - name: Verify dist exists
        run: test -s dist/loader.js || { echo "::error::dist/loader.js missing or empty after build"; exit 1; }

      - name: Validate package is installable
        run: npm run validate-pack

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ github.event.inputs.publish_auth == 'token' && secrets.NPM_TOKEN || '' }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CHANNEL="${{ github.event.inputs.channel }}"
          # --provenance attaches a sigstore-backed attestation linking the
          # tarball to this workflow run + commit. Requires OIDC, so we only
          # pass it in trusted-publishing mode; the token escape hatch skips it.
          PROVENANCE_FLAG=""
          if [ "${{ github.event.inputs.publish_auth || 'trusted' }}" = "trusted" ]; then
            PROVENANCE_FLAG="--provenance"
          fi
          echo "Publishing @cmetech/otto@${VERSION} with --tag ${CHANNEL} ${PROVENANCE_FLAG}..."
          # --ignore-scripts: skip prepublishOnly since we built explicitly above
          if OUTPUT=$(npm publish --ignore-scripts --access public $PROVENANCE_FLAG --tag "${CHANNEL}" 2>&1); then
            echo "$OUTPUT"
          else
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published\|You cannot publish over"; then
              echo "::warning::@cmetech/otto@${VERSION} already published, skipping"
            else
              echo "$OUTPUT"
              exit 1
            fi
          fi

      - name: Post-publish smoke test
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          npm init -y > /dev/null 2>&1

          echo "Waiting for @cmetech/otto@${VERSION} to appear on npm..."
          # First-publish registry propagation can take 10-15 min. Budget: 20 attempts, max 60s delay (~18 min worst case).
          DELAY=5
          MAX_ATTEMPTS=20
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            PUBLISHED=$(npm view "@cmetech/otto@${VERSION}" version 2>/dev/null || echo "")
            if [ "${PUBLISHED}" = "${VERSION}" ]; then
              echo "  ✓ Version ${VERSION} visible on npm (attempt ${attempt})"
              break
            fi
            if [ "$attempt" = "$MAX_ATTEMPTS" ]; then
              echo "::warning::@cmetech/otto@${VERSION} not visible on npm after ${MAX_ATTEMPTS} attempts — skipping smoke test"
              exit 0
            fi
            echo "  Attempt ${attempt}/${MAX_ATTEMPTS}: not yet visible, retrying in ${DELAY}s..."
            sleep "$DELAY"
            DELAY=$((DELAY * 2))
            if [ "$DELAY" -gt 60 ]; then DELAY=60; fi
          done

          echo "Installing @cmetech/otto@${VERSION}..."
          DELAY=5
          for attempt in 1 2 3; do
            if npm install "@cmetech/otto@${VERSION}" 2>&1 | tee /tmp/install-output.txt; then
              echo "  ✓ Install succeeded"
              RAW=$(node node_modules/@cmetech/otto/dist/loader.js --version 2>&1 || echo "FAILED")
              ACTUAL=$(echo "$RAW" | sed 's/\x1b\[[0-9;]*m//g' | grep -oE "^${VERSION}$" | head -1)
              if [ "$ACTUAL" = "$VERSION" ]; then
                echo "  ✓ otto --version = ${VERSION}"
                echo "Published package is functional"
                exit 0
              else
                echo "::error::Version mismatch: expected ${VERSION} in output:"
                echo "$RAW"
                exit 1
              fi
            fi
            echo "Install attempt ${attempt}/3 failed, retrying in ${DELAY}s..."
            cat /tmp/install-output.txt
            sleep "$DELAY"
            DELAY=$((DELAY * 2))
          done
          echo "::error::Smoke test failed — @cmetech/otto@${VERSION} not installable"
          exit 1

      - name: Verify dist-tag after publish
        if: github.event.inputs.channel == 'latest'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Verifying npm dist-tag 'latest' points to ${VERSION}..."
          DELAY=5
          MAX_ATTEMPTS=20
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            LATEST=$(npm view @cmetech/otto dist-tags.latest 2>/dev/null || echo "")
            if [ "${LATEST}" = "${VERSION}" ]; then
              echo "  ✓ npm dist-tags.latest = ${VERSION}"
              exit 0
            fi
            echo "  Attempt ${attempt}/${MAX_ATTEMPTS}: latest=${LATEST}, expected=${VERSION}, retrying in ${DELAY}s..."
            sleep "$DELAY"
            DELAY=$((DELAY * 2))
            if [ "$DELAY" -gt 60 ]; then DELAY=60; fi
          done
          echo "::error::dist-tags.latest is '${LATEST}' but expected '${VERSION}' — run: npm dist-tag add @cmetech/otto@${VERSION} latest"
          exit 1

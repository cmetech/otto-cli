services:
  otto:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
      args:
        OTTO_VERSION: latest
    container_name: otto-sandbox
    volumes:
      - ../:/workspace
      - otto-state:/home/otto/.otto
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true

volumes:
  otto-state:
    driver: local
